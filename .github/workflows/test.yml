name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      working-directory: ./pkg
      run: |
        python -m pip install --upgrade pip
        pip install pytest gurobipy pyomo
        # open-source backends, best effort: tests skip cleanly where a wheel
        # is unavailable for this Python version; one line per package so a
        # missing wheel does not drop the others
        pip install ortools || true
        pip install highspy || true
        pip install "jax[cpu]" || true
        pip install mpax || true
        pip install clarabel || true
        pip install -e .

    - name: Run tests
      working-directory: ./pkg
      run: python -m pytest tests/ -v --tb=short
